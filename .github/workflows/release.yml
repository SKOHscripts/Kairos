name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -e ".[dev]" pyinstaller pyinstaller-hooks-contrib

      - name: Lancer les tests (garde-fou avant packaging)
        run: pytest

      - name: Construire l'exécutable (PyInstaller)
        run: pyinstaller packaging/kairos.spec --distpath dist --noconfirm

      - name: Nommer l'artefact par OS
        shell: bash
        run: |
          mkdir -p out
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/kairos.exe out/kairos-windows-x86_64.exe
          else
            cp dist/kairos out/kairos-linux-x86_64
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: kairos-${{ runner.os }}
          path: out/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # Le GITHUB_TOKEN auto-généré est en lecture seule par défaut sur ce dépôt :
    # sans ce bloc, la création de release échoue en 403 (« Resource not
    # accessible by integration ») — pas besoin d'un token/PAT personnel, juste
    # de déclarer explicitement la permission nécessaire à ce job.
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Créer la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          generate_release_notes: true
